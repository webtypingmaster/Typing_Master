<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typing Master — Invite Friends</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161921; --surface2: #1e2330;
      --border: #252a35; --accent: #7c6af7; --accent2: #4ecdc4;
      --text: #e8eaf0; --muted: #8892a4; --success: #4ecdc4; --error: #ff6b6b;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 100;
    }
    .nav-logo { font-size: 1.1rem; font-weight: 700; }
    .nav-logo span { background: linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-right { display: flex; align-items: center; gap: 0.7rem; }
    .nav-btn { padding: 0.4rem 0.9rem; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: inherit; font-size: 0.82rem; cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .nav-btn:hover { border-color: var(--accent); color: var(--text); }
    main { max-width: 800px; margin: 0 auto; padding: 2rem; }

    .page-header { text-align: center; margin-bottom: 1.8rem; }
    .page-header h1 { font-size: 1.9rem; font-weight: 700; }
    .page-header p  { color: var(--muted); margin-top: 0.4rem; }

    .section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .section h3 { font-size: 1rem; font-weight: 600; margin-bottom: 1.2rem; }

    .link-box {
      display: flex; align-items: center; gap: 0.6rem;
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 0.7rem 1rem;
    }
    .link-box input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--accent2); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
    }
    .copy-btn { padding: 0.5rem 1rem; background: linear-gradient(135deg,var(--accent),#9b8cf9); border: none; border-radius: 8px; color: #fff; font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; }
    .copy-btn:hover { opacity: 0.88; }
    .copy-msg { margin-top: 0.6rem; font-size: 0.82rem; color: var(--success); display: none; }

    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; text-align: center; }
    .stat-box .val { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
    .stat-box .lbl { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.2rem; }

    .invite-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .invite-table th { padding: 0.6rem 0.8rem; text-align: left; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
    .invite-table td { padding: 0.65rem 0.8rem; border-bottom: 1px solid var(--border); }
    .invite-table tr:last-child td { border-bottom: none; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; }
    .pill { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 100px; font-size: 0.72rem; font-weight: 600; background: rgba(124,106,247,0.15); color: var(--accent); }
    .empty { color: var(--muted); text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">⌨️ Typing <span>Master</span></div>
    <div class="nav-right">
      <a href="/typing" class="nav-btn">⌨️ Test</a>
      <a href="/leaderboard" class="nav-btn">🏆 Leaderboard</a>
      <a href="/profile" class="nav-btn">👤 Profile</a>
      <a href="/logout" class="nav-btn">Logout</a>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1>🎁 Invite Friends</h1>
      <p>Share link & Invite Friends To Join!</p>
    </div>

    <div class="section">
      <h3>🔗 Your Invite Link</h3>
      <div class="link-box">
        <input type="text" id="invite-link" readonly />
        <button class="copy-btn" onclick="copyLink()">📋 Copy</button>
      </div>
      <div class="copy-msg" id="copy-msg">✅ Link copy ho gaya!</div>
    </div>

    <div class="stats-row">
      <div class="stat-box"><div class="val" id="st-total">—</div><div class="lbl">Total Invited</div></div>
    </div>

    <div class="section">
      <h3>👥 Invited Users</h3>
      <div id="invited-container"><div class="empty">Loading…</div></div>
    </div>
  </main>

  <script>
    async function load() {
      const d = await fetch('/api/invite-stats').then(r => r.json());
      if (!d.success) return;

      const link = window.location.origin + '/?invite=' + d.username;
      document.getElementById('invite-link').value = link;
      document.getElementById('st-total').textContent = d.totalInvited;

      const container = document.getElementById('invited-container');
      if (!d.invitedList.length) {
        container.innerHTML = '<div class="empty">Abhi kisi ne tumhara link use nahi kiya. Share karo! 🎁</div>';
        return;
      }
      container.innerHTML = `
        <table class="invite-table">
          <thead><tr><th>#</th><th>Naam</th><th>Username</th><th>Level</th><th>Best WPM</th><th>Joined</th></tr></thead>
          <tbody>${d.invitedList.map((u, i) => `
            <tr>
              <td class="mono">${i+1}</td>
              <td>${u.name}</td>
              <td class="mono" style="color:var(--accent2)">@${u.username}</td>
              <td><span class="pill">L${u.levelsCompleted}/10</span></td>
              <td class="mono">${u.bestWpm} wpm</td>
              <td style="color:var(--muted);font-size:0.8rem">${new Date(u.joinedAt).toLocaleDateString('en-PK')}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    }

    function copyLink() {
      const input = document.getElementById('invite-link');
      input.select();
      navigator.clipboard.writeText(input.value).then(() => {
        const msg = document.getElementById('copy-msg');
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 2500);
      });
    }

    load();
  </script>
</body>
</html>
