<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typing Master — My Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161921; --surface2: #1e2330;
      --border: #252a35; --accent: #7c6af7; --accent2: #4ecdc4;
      --text: #e8eaf0; --muted: #8892a4; --success: #4ecdc4; --error: #ff6b6b;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 100;
    }
    .nav-logo { font-size: 1.1rem; font-weight: 700; }
    .nav-logo span { background: linear-gradient(90deg,var(--accent),var(--accent2)); background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-right { display: flex; align-items: center; gap: 0.7rem; }
    .nav-btn { padding: 0.4rem 0.9rem; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: inherit; font-size: 0.82rem; cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .nav-btn:hover { border-color: var(--accent); color: var(--text); }
    main { max-width: 800px; margin: 0 auto; padding: 2rem; }

    .profile-header {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 2rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1.5rem;
    }
    .avatar {
      width: 90px; height: 90px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700; color: #fff; flex-shrink: 0;
      position: relative; cursor: pointer; overflow: hidden;
      border: 3px solid var(--accent);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .avatar-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s; border-radius: 50%;
      font-size: 0.65rem; color: #fff; font-weight: 600; gap: 2px;
    }
    .avatar:hover .avatar-overlay { opacity: 1; }
    .avatar-overlay span { font-size: 1.2rem; }
    .avatar-actions { display: flex; gap: 0.5rem; margin-top: 0.6rem; }
    .avatar-btn {
      font-size: 0.72rem; padding: 0.3rem 0.8rem; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); cursor: pointer; transition: background 0.2s;
    }
    .avatar-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .avatar-btn.del { border-color: #ff6b6b; color: #ff6b6b; }
    .avatar-btn.del:hover { background: #ff6b6b; color: #fff; }
    #avatar-file-input { display: none; }
    .profile-info h2 { font-size: 1.4rem; font-weight: 700; }
    .profile-info p  { color: var(--muted); font-size: 0.88rem; margin-top: 0.3rem; }
    .profile-info .bio { color: var(--text); font-size: 0.9rem; margin-top: 0.5rem; font-style: italic; }

    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; text-align: center; }
    .stat-box .val { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
    .stat-box .lbl { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.2rem; }

    .section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .section h3 { font-size: 1rem; font-weight: 600; margin-bottom: 1.2rem; }

    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.4rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
    input, textarea {
      width: 100%; padding: 0.7rem 1rem; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: inherit; font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 70px; }
    .btn { padding: 0.7rem 1.4rem; background: linear-gradient(135deg,var(--accent),#9b8cf9); border: none; border-radius: 10px; color: #fff; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.88; }
    .msg { margin-top: 0.8rem; font-size: 0.85rem; padding: 0.5rem 0.8rem; border-radius: 8px; display: none; }
    .msg.ok  { background: rgba(78,205,196,0.12); color: var(--success); border: 1px solid rgba(78,205,196,0.25); }
    .msg.err { background: rgba(255,107,107,0.12); color: var(--error);   border: 1px solid rgba(255,107,107,0.25); }

    /* History table */
    .history-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .history-table th { padding: 0.6rem 0.8rem; text-align: left; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
    .history-table td { padding: 0.65rem 0.8rem; border-bottom: 1px solid var(--border); }
    .history-table tr:last-child td { border-bottom: none; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; }
    .pill { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 100px; font-size: 0.72rem; font-weight: 600; background: rgba(255,209,102,0.15); color: #ffd166; }
    .empty { color: var(--muted); text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">⌨️ Typing <span>Master</span></div>
    <div class="nav-right">
      <a href="/typing" class="nav-btn">← Test</a>
      <a href="/leaderboard" class="nav-btn">🏆 Leaderboard</a>
      <a href="/invite" class="nav-btn">🎁 Invite</a>
      <a href="/logout" class="nav-btn">Logout</a>
    </div>
  </nav>

  <main>
    <!-- Profile Header -->
    <div class="profile-header">
      <div style="display:flex;flex-direction:column;align-items:center;gap:0.5rem;">
        <div class="avatar" id="avatar-icon" onclick="document.getElementById('avatar-file-input').click()">
          <span id="avatar-letter">?</span>
          <div class="avatar-overlay"><span>📷</span>Change Photo</div>
        </div>
        <div class="avatar-actions" id="avatar-actions" style="display:none;">
          <button class="avatar-btn" onclick="document.getElementById('avatar-file-input').click()">📷 Change Photo</button>
          <button class="avatar-btn del" id="del-avatar-btn" onclick="deleteAvatar()">🗑️ Delete</button>
        </div>
        <input type="file" id="avatar-file-input" accept="image/*" onchange="uploadAvatar(this)">
        <div class="msg" id="avatar-msg" style="display:none;text-align:center;"></div>
      </div>
      <div class="profile-info">
        <h2 id="display-name">Loading…</h2>
        <p id="display-username" class="mono" style="color:var(--accent2);"></p>
        <p id="display-email"></p>
        <p id="display-phone"></p>
        <p id="display-joined"></p>
        <p class="bio" id="display-bio"></p>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box"><div class="val" id="st-tests">—</div><div class="lbl">Total Tests</div></div>
      <div class="stat-box"><div class="val" id="st-best">—</div><div class="lbl">Best WPM</div></div>
      <div class="stat-box"><div class="val" id="st-avg">—</div><div class="lbl">Avg WPM</div></div>
      <div class="stat-box"><div class="val" id="st-acc">—</div><div class="lbl">Avg Accuracy</div></div>
      <div class="stat-box"><div class="val" id="st-lvl">—</div><div class="lbl">Levels Done</div></div>
    </div>

    <!-- Edit Profile -->
    <div class="section">
      <h3>✏️ Edit Profile</h3>
      <div class="form-group"><label>Naam</label><input type="text" id="edit-name" placeholder="Tumhara naam"/></div>
      <div class="form-group"><label>Bio (optional)</label><textarea id="edit-bio" placeholder="Apne baare mein kuch likho…"></textarea></div>
      <button class="btn" onclick="updateProfile()">Save Profile</button>
      <div class="msg" id="profile-msg"></div>
    </div>

    <!-- Change Password -->
    <div class="section">
      <h3>🔒 Change Password</h3>
      <div class="form-group">
        <label>Purana Password</label>
        <input type="password" id="old-pass" placeholder="Purana password daalo"/>
      </div>
      <div class="form-group">
        <label>Naya Password</label>
        <input type="password" id="new-pass" placeholder="Min 8 chars, 1 capital, 1 number, 1 special (!@#$%^&*)"/>
      </div>
      <div class="form-group">
        <label>Naya Password Confirm Karo</label>
        <input type="password" id="confirm-pass" placeholder="Dobara naya password"/>
      </div>
      <button class="btn" onclick="changePassword()">Change Password</button>
      <div class="msg" id="pass-msg"></div>
    </div>

    <!-- Test History -->
    <div class="section">
      <h3>📋 Meri Test History</h3>
      <div id="history-container"><div class="empty">Loading…</div></div>
    </div>
  </main>

  <script>
    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text; el.className = 'msg ' + type; el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    async function loadProfile() {
      let d;
      try {
        d = await fetch('/api/me').then(r => r.json());
        if (!d.success) throw new Error(d.message || 'Failed to load');
      } catch (err) {
        document.getElementById('display-name').textContent = '⚠️ Profile load nahi ho saka';
        return;
      }
      const u = d.user;

      // Avatar
      const avatarEl = document.getElementById('avatar-icon');
      const letterEl = document.getElementById('avatar-letter');
      if (u.avatar) {
        // Show photo
        letterEl.style.display = 'none';
        let img = avatarEl.querySelector('img.av-img');
        if (!img) { img = document.createElement('img'); img.className = 'av-img'; avatarEl.insertBefore(img, avatarEl.firstChild); }
        img.src = u.avatar;
        document.getElementById('del-avatar-btn').style.display = '';
        document.getElementById('avatar-actions').style.display = 'flex';
      } else {
        // Show letter
        const existImg = avatarEl.querySelector('img.av-img');
        if (existImg) existImg.remove();
        letterEl.style.display = '';
        letterEl.textContent = (u.name || '?')[0].toUpperCase();
        document.getElementById('del-avatar-btn').style.display = 'none';
        document.getElementById('avatar-actions').style.display = 'flex';
      }

      document.getElementById('display-name').textContent  = u.name;
      document.getElementById('display-username').textContent = '@' + u.username;
      document.getElementById('display-email').textContent = u.email;
      document.getElementById('display-phone').textContent = u.phone ? '📱 ' + u.phone : '';
      document.getElementById('display-joined').textContent = 'Joined: ' + new Date(u.createdAt).toLocaleDateString('en-PK', { day:'2-digit', month:'long', year:'numeric' });
      document.getElementById('display-bio').textContent   = u.bio || '';
      document.getElementById('edit-name').value = u.name;
      document.getElementById('edit-bio').value  = u.bio || '';
      const s = u.stats;
      document.getElementById('st-tests').textContent = s.totalTests;
      document.getElementById('st-best').textContent  = s.bestWpm + ' wpm';
      document.getElementById('st-avg').textContent   = s.avgWpm + ' wpm';
      document.getElementById('st-acc').textContent   = s.avgAcc + '%';
      document.getElementById('st-lvl').textContent   = s.levelsCompleted + '/50';
    }

    async function uploadAvatar(input) {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) {
        showAvatarMsg('Photo 2MB se badi hai!', 'err'); return;
      }
      const formData = new FormData();
      formData.append('avatar', file);
      showAvatarMsg('Upload ho raha hai…', 'ok');
      let d;
      try {
        d = await fetch('/api/upload-avatar', { method: 'POST', body: formData }).then(r => r.json());
      } catch (err) {
        showAvatarMsg('❌ Network error — dobara try karo.', 'err');
        input.value = '';
        return;
      }
      if (d.success) {
        showAvatarMsg('✅ ' + d.message, 'ok');
        loadProfile();
      } else {
        showAvatarMsg('❌ ' + d.message, 'err');
      }
      input.value = '';
    }

    async function deleteAvatar() {
      if (!confirm('Photo hata dein?')) return;
      let d;
      try {
        d = await fetch('/api/delete-avatar', { method: 'DELETE' }).then(r => r.json());
      } catch (err) {
        return showAvatarMsg('❌ Network error — dobara try karo.', 'err');
      }
      showAvatarMsg(d.success ? '✅ ' + d.message : '❌ ' + d.message, d.success ? 'ok' : 'err');
      if (d.success) loadProfile();
    }

    function showAvatarMsg(msg, type) {
      const el = document.getElementById('avatar-msg');
      el.textContent = msg;
      el.className = 'msg ' + type;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    async function loadHistory() {
      const container = document.getElementById('history-container');
      let d;
      try {
        d = await fetch('/api/my-results').then(r => r.json());
      } catch (err) {
        container.innerHTML = '<div class="empty">⚠️ History load nahi ho saki. Page refresh karo.</div>'; return;
      }
      if (!d.success || !d.results.length) {
        container.innerHTML = '<div class="empty">Abhi koi test nahi diya. Jao type karo! ⌨️</div>'; return;
      }
      container.innerHTML = `
        <table class="history-table">
          <thead><tr><th>#</th><th>Level</th><th>WPM</th><th>Accuracy</th><th>Correct</th><th>Wrong</th><th>Time</th><th>Date</th></tr></thead>
          <tbody>${d.results.slice(0,30).map((r, i) => `
            <tr>
              <td class="mono">${i+1}</td>
              <td><span class="pill">L${r.level}</span></td>
              <td class="mono"><strong>${r.wpm}</strong></td>
              <td class="mono">${r.accuracy}%</td>
              <td style="color:#4ecdc4">${r.correctWords}</td>
              <td style="color:#ff6b6b">${r.wrongWords}</td>
              <td class="mono">${r.timeTaken.toFixed(1)}s</td>
              <td style="color:var(--muted);font-size:0.8rem">${new Date(r.completedAt).toLocaleDateString('en-PK')}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    }

    async function updateProfile() {
      const name = document.getElementById('edit-name').value.trim();
      const bio  = document.getElementById('edit-bio').value.trim();
      if (!name) return showMsg('profile-msg', 'Naam khali nahi ho sakta.', 'err');
      let d;
      try {
        d = await fetch('/api/update-profile', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, bio })
        }).then(r => r.json());
      } catch (err) {
        return showMsg('profile-msg', 'Network error — dobara try karo.', 'err');
      }
      showMsg('profile-msg', d.message, d.success ? 'ok' : 'err');
      if (d.success) loadProfile();
    }

    async function changePassword() {
      const currentPassword = document.getElementById('old-pass').value;
      const newPassword     = document.getElementById('new-pass').value;
      const confirmPassword = document.getElementById('confirm-pass').value;

      if (!currentPassword || !newPassword || !confirmPassword)
        return showMsg('pass-msg', 'Sab fields bharo.', 'err');

      if (newPassword !== confirmPassword)
        return showMsg('pass-msg', 'Naya password aur confirm password match nahi karte.', 'err');

      let d;
      try {
        d = await fetch('/api/change-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ currentPassword, newPassword })
        }).then(r => r.json());
      } catch (err) {
        return showMsg('pass-msg', 'Network error — dobara try karo.', 'err');
      }

      showMsg('pass-msg', d.message, d.success ? 'ok' : 'err');
      if (d.success) {
        document.getElementById('old-pass').value = '';
        document.getElementById('new-pass').value = '';
        document.getElementById('confirm-pass').value = '';
      }
    }

    loadProfile();
    loadHistory();
  </script>
</body>
</html>
