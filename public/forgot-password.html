<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typing Master — Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161921; --border: #252a35;
      --accent: #7c6af7; --accent2: #4ecdc4;
      --text: #e8eaf0; --muted: #8892a4;
      --success: #4ecdc4; --error: #ff6b6b;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 2rem; overflow-y: auto;
    }
    body::before {
      content: ''; position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
      top: -200px; left: -100px; pointer-events: none;
    }
    body::after {
      content: ''; position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(78,205,196,0.08) 0%, transparent 70%);
      bottom: -100px; right: -100px; pointer-events: none;
    }
    .page {
      width: 100%; max-width: 480px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px; padding: 2.5rem 2rem;
      text-align: center;
    }
    .logo-row {
      display: flex; align-items: center;
      justify-content: center; gap: 10px;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .logo-text { font-size: 1.4rem; font-weight: 700; }
    .logo-text span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .key-icon {
      width: 72px; height: 72px;
      background: rgba(124,106,247,0.15);
      border-radius: 20px; margin: 0 auto 1.5rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
    }
    h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.5rem; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    .form-group { text-align: left; margin-bottom: 1.2rem; }
    label {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    input {
      width: 100%; padding: 0.8rem 1rem;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem; outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%; padding: 0.9rem;
      background: linear-gradient(135deg, #4ecdc4, #3dbdb5);
      border: none; border-radius: 12px;
      color: #0d1a19; font-family: inherit;
      font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .back-link {
      display: block; margin-top: 1.4rem;
      color: var(--accent2); font-size: 0.88rem;
      font-weight: 600; cursor: pointer;
      text-decoration: none; transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 0.7; }
    .message {
      margin-top: 1rem; padding: 0.75rem 1rem;
      border-radius: 10px; font-size: 0.88rem;
      text-align: center; display: none;
    }
    .message.error   { background: rgba(255,107,107,0.12); color: var(--error);   border: 1px solid rgba(255,107,107,0.25); }
    .message.success { background: rgba(78,205,196,0.12);  color: var(--success); border: 1px solid rgba(78,205,196,0.25); }

    /* Token display box */
    .token-box {
      display: none;
      background: rgba(124,106,247,0.1);
      border: 1px solid rgba(124,106,247,0.3);
      border-radius: 14px; padding: 1.2rem;
      margin-top: 1rem; text-align: center;
    }
    .token-box.show { display: block; }
    .token-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .token-code {
      font-size: 2rem; font-weight: 700; letter-spacing: 0.25em;
      color: var(--accent); font-family: 'JetBrains Mono', monospace;
    }
    .token-note { font-size: 0.78rem; color: var(--muted); margin-top: 0.5rem; }
    .proceed-btn {
      width: 100%; padding: 0.8rem;
      background: linear-gradient(135deg, var(--accent), #9b8cf9);
      border: none; border-radius: 12px;
      color: #fff; font-family: inherit;
      font-size: 0.95rem; font-weight: 700;
      cursor: pointer; margin-top: 1rem;
      transition: opacity 0.2s;
    }
    .proceed-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="logo-row">
        <div class="logo-icon">⌨️</div>
        <div class="logo-text">Typing <span>Master</span></div>
      </div>

      <div class="key-icon">🔑</div>
      <h2>Forgot Password</h2>
      <p class="subtitle">Enter your email — we'll help you reset it</p>

      <div class="form-group">
        <label>📧 EMAIL</label>
        <input type="email" id="fp-email" placeholder="Your_Email" />
      </div>

      <button class="btn" onclick="submitForgot()">Submit →</button>

      <!-- Token show hoga yahan -->
      <div class="token-box" id="token-box">
        <div class="token-label">Your Reset Token (15 min valid)</div>
        <div class="token-code" id="token-display"></div>
        <div class="token-note">Yeh token note kar lein — next page pe enter karna hoga</div>
        <button class="proceed-btn" onclick="goToReset()">Set New Password →</button>
      </div>

      <div class="message" id="fp-msg"></div>
      <a class="back-link" href="/">← Back to Login</a>
    </div>
  </div>

  <script>
    let savedUserId = '';
    let savedToken  = '';

    function showMsg(text, type) {
      const el = document.getElementById('fp-msg');
      el.textContent = text; el.className = 'message ' + type;
      el.style.display = 'block';
    }

    async function submitForgot() {
      const email = document.getElementById('fp-email').value.trim();
      if (!email) return showMsg('Email daalo.', 'error');

      try {
        const res  = await fetch('/api/forgot-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (data.success) {
          savedUserId = data.userId;
          savedToken  = data.token;
          document.getElementById('token-display').textContent = data.token;
          document.getElementById('token-box').classList.add('show');
          document.getElementById('fp-msg').style.display = 'none';
        } else {
          showMsg(data.message || 'Error hua.', 'error');
        }
      } catch(e) {
        showMsg('Server se connect nahi ho saka.', 'error');
      }
    }

    function goToReset() {
      window.location.href = `/reset-password?userId=${savedUserId}&token=${savedToken}`;
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitForgot();
    });
  </script>
</body>
</html>
