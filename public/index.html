<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typing Master — Start Your Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f14;
      --surface:  #161921;
      --border:   #252a35;
      --accent:   #7c6af7;
      --accent2:  #4ecdc4;
      --text:     #e8eaf0;
      --muted:    #8892a4;
      --success:  #4ecdc4;
      --error:    #ff6b6b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-y: auto;
    }

    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
      top: -200px; left: -100px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(78,205,196,0.08) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      pointer-events: none;
    }

    .page {
      width: 100%;
      max-width: 460px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      margin-bottom: 1rem;
      font-size: 1.5rem;
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .logo h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
    }

    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 1.8rem;
    }

    .tab {
      flex: 1;
      padding: 0.6rem;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    input.has-toggle {
      padding-right: 2.8rem;
    }

    .toggle-eye {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--muted);
      user-select: none;
      transition: color 0.2s;
    }
    .toggle-eye:hover { color: var(--accent); }

    .forgot-link {
      display: block;
      text-align: right;
      margin-top: 6px;
      font-size: 0.82rem;
      color: var(--accent2);
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .forgot-link:hover { opacity: 0.8; }

    .btn {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, var(--accent), #9b8cf9);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.2rem;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }

    .message {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.88rem;
      text-align: center;
      display: none;
    }

    .message.error   { background: rgba(255,107,107,0.12); color: var(--error);   border: 1px solid rgba(255,107,107,0.25); }
    .message.success { background: rgba(78,205,196,0.12);  color: var(--success); border: 1px solid rgba(78,205,196,0.25); }

    .form-panel { display: none; }
    .form-panel.active { display: block; }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo">
      <div class="logo-icon">⌨️</div>
      <h1>Typing <span>Master</span></h1>
      <p>Test and improve your typing speed</p>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('register')">Create Account</button>
        <button class="tab"        onclick="switchTab('login')">Sign In</button>
      </div>

      <!-- Register -->
      <div class="form-panel active" id="panel-register">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Your_Name" />
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="Your_Username" maxlength="8" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="Your_Email" />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="reg-phone" placeholder="Your_Phone_Number" />
        </div>
        <div class="form-group">
          <label>🔒 Password</label>
          <div class="input-wrap">
            <input type="password" id="reg-password" class="has-toggle" placeholder="••••••••" />
            <span class="toggle-eye" onclick="togglePw('reg-password', this)">👁️</span>
          </div>
        </div>
        <div class="form-group">
          <label>🔒 Confirm Password</label>
          <div class="input-wrap">
            <input type="password" id="reg-confirm-password" class="has-toggle" placeholder="••••••••" />
            <span class="toggle-eye" onclick="togglePw('reg-confirm-password', this)">👁️</span>
          </div>
        </div>
        <div class="form-group">
          <label>Invite Code</label>
          <input type="text" id="reg-invite" placeholder="Invite_Code" />
        </div>
        <button class="btn" onclick="register()">Start Typing Journey →</button>
        <div class="message" id="reg-msg"></div>
      </div>

      <!-- Login -->
      <div class="form-panel" id="panel-login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="Your_Email" />
        </div>
        <div class="form-group">
          <label>🔒 Password</label>
          <div class="input-wrap">
            <input type="password" id="login-password" class="has-toggle" placeholder="••••••••" />
            <span class="toggle-eye" onclick="togglePw('login-password', this)">👁️</span>
          </div>
          <a class="forgot-link" onclick="goForgot()">Forgot Password?</a>
        </div>
        <button class="btn" onclick="login()">Sign In →</button>
        <div class="message" id="login-msg"></div>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'register') || (i === 1 && tab === 'login'));
      });
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + tab).classList.add('active');
      // Purana error/success message hide karo - warna doosre tab pe gaye
      // aur wapas aane par purana message dikhta rehta tha
      document.getElementById('reg-msg').style.display = 'none';
      document.getElementById('login-msg').style.display = 'none';
    }

    function togglePw(id, icon) {
      const input = document.getElementById(id);
      if (input.type === 'password') { input.type = 'text'; icon.style.opacity = '1'; icon.style.color = 'var(--accent)'; }
      else { input.type = 'password'; icon.style.opacity = '0.6'; icon.style.color = 'var(--muted)'; }
    }

    function goForgot() {
      window.location.href = '/forgot-password';
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'message ' + type;
      el.style.display = 'block';
    }

    // Full Name: har word ka pehla letter capital, baqi small
    function formatName(value) {
      return value
        .split(' ')
        .map(w => w.length ? w.charAt(0).toUpperCase() + w.slice(1).toLowerCase() : w)
        .join(' ');
    }
    const nameInput = document.getElementById('reg-name');
    nameInput.addEventListener('input', () => {
      const pos = nameInput.selectionStart;
      const before = nameInput.value;
      nameInput.value = formatName(nameInput.value);
      // cursor position theek rakho jitna length change na ho
      if (nameInput.value.length === before.length) nameInput.setSelectionRange(pos, pos);
    });

    // Username: sirf lowercase letters aur numbers allow karo
    const usernameInput = document.getElementById('reg-username');
    usernameInput.addEventListener('input', () => {
      usernameInput.value = usernameInput.value.toLowerCase().replace(/[^a-z0-9]/g, '');
    });

    // Agar invite link se aaye ho (?invite=username) to Invite Code field auto-fill + lock karo
    (function prefillInvite() {
      const params = new URLSearchParams(window.location.search);
      const invite = params.get('invite');
      if (invite) {
        const inviteInput = document.getElementById('reg-invite');
        inviteInput.value = invite.trim().toLowerCase();
        inviteInput.readOnly = true;
        inviteInput.style.opacity = '0.7';
        inviteInput.style.cursor = 'not-allowed';
      }
    })();

    async function register() {
      const name            = document.getElementById('reg-name').value.trim();
      const username        = document.getElementById('reg-username').value.trim();
      const email           = document.getElementById('reg-email').value.trim();
      const phone           = document.getElementById('reg-phone').value.trim();
      const password        = document.getElementById('reg-password').value;
      const confirmPassword = document.getElementById('reg-confirm-password').value;
      const inviteCode      = document.getElementById('reg-invite').value.trim();

      if (!name || !username || !email || !phone || !password || !confirmPassword)
        return showMsg('reg-msg', 'Please fill all fields.', 'error');

      // Username format: 4 lowercase letters + 4 digits
      const usernameRegex = /^[a-z]{4}\d{4}$/;
      if (!usernameRegex.test(username))
        return showMsg('reg-msg', 'Username mein 4 small letters (a-z) aur 4 numbers (0-9) hone chahiye. Example: abcd1234', 'error');

      if (password !== confirmPassword)
        return showMsg('reg-msg', 'Password aur Confirm Password match nahi kar rahe.', 'error');

      // Strong password validation
      const passRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$/;
      if (!passRegex.test(password)) return showMsg('reg-msg', 'Password mein 8+ characters, 1 capital (A-Z), 1 small (a-z), 1 number aur 1 special character (!@#$%^&*) hona chahiye.', 'error');

      const res  = await fetch('/register', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, username, email, phone, password, confirmPassword, inviteCode })
      });
      const data = await res.json();
      if (data.success) { showMsg('reg-msg', 'Account created! Redirecting…', 'success'); setTimeout(() => location.href = data.redirect, 800); }
      else showMsg('reg-msg', data.message, 'error');
    }

    async function login() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showMsg('login-msg', 'Please fill all fields.', 'error');

      const res  = await fetch('/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.success) { showMsg('login-msg', 'Welcome back! Redirecting…', 'success'); setTimeout(() => location.href = data.redirect, 800); }
      else showMsg('login-msg', data.message, 'error');
    }

    document.addEventListener('keydown', e => {
      // Sirf actual form inputs pe focus hote hue Enter se submit karo - warna
      // "Forgot Password?" link, eye-toggle icon, ya locked invite field pe
      // Enter dabane se bhi register()/login() chal jata tha
      if (e.key !== 'Enter') return;
      const formIds = [
        'reg-name', 'reg-username', 'reg-email', 'reg-phone',
        'reg-password', 'reg-confirm-password', 'reg-invite',
        'login-email', 'login-password'
      ];
      if (!formIds.includes(document.activeElement.id)) return;
      const active = document.querySelector('.form-panel.active');
      if (active.id === 'panel-register') register(); else login();
    });
  </script>
</body>
</html>
