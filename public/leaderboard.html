<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typing Master — Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161921; --border: #252a35;
      --accent: #7c6af7; --accent2: #4ecdc4; --text: #e8eaf0; --muted: #8892a4;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 100;
    }
    .nav-logo { font-size: 1.1rem; font-weight: 700; }
    .nav-logo span { background: linear-gradient(90deg,var(--accent),var(--accent2)); background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-right { display: flex; gap: 0.7rem; }
    .nav-btn { padding: 0.4rem 0.9rem; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: inherit; font-size: 0.82rem; cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .nav-btn:hover { border-color: var(--accent); color: var(--text); }
    main { max-width: 700px; margin: 0 auto; padding: 2rem; }

    .page-header { text-align: center; margin-bottom: 2rem; }
    .page-header h1 { font-size: 2rem; font-weight: 700; }
    .page-header p  { color: var(--muted); margin-top: 0.4rem; }

    .podium { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 0.8rem; margin-bottom: 2rem; align-items: end; }
    .podium-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 1.2rem 0.8rem; text-align: center;
    }
    .podium-card.first { border-color: rgba(255,209,102,0.5); background: rgba(255,209,102,0.05); }
    .podium-card.second { border-color: rgba(180,180,180,0.4); }
    .podium-card.third  { border-color: rgba(205,127,50,0.4); }
    .podium-rank { font-size: 2rem; margin-bottom: 0.4rem; }
    .podium-name { font-weight: 600; font-size: 0.9rem; }
    .podium-wpm  { font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-top: 0.3rem; }
    .podium-wpm span { font-size: 0.75rem; color: var(--muted); }
    .podium-acc  { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }

    .board { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .board-row {
      display: grid; grid-template-columns: 50px 1fr 100px 80px 80px;
      padding: 0.9rem 1.2rem; border-bottom: 1px solid var(--border);
      align-items: center; transition: background 0.15s;
    }
    .board-row:last-child { border-bottom: none; }
    .board-row:hover { background: rgba(124,106,247,0.05); }
    .board-row.header { background: rgba(255,255,255,0.03); font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .board-row.me { background: rgba(124,106,247,0.08); border-color: rgba(124,106,247,0.2); }
    .rank-num { font-weight: 700; font-size: 1rem; color: var(--muted); }
    .rank-1 { color: #ffd166; } .rank-2 { color: #b4b4b4; } .rank-3 { color: #cd7f32; }
    .user-name { font-weight: 500; }
    .user-name .you { font-size: 0.7rem; background: rgba(124,106,247,0.2); color: var(--accent); border-radius: 4px; padding: 0.1rem 0.4rem; margin-left: 0.4rem; }
    .wpm-val  { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1rem; color: var(--accent); }
    .acc-val  { font-family: 'JetBrains Mono', monospace; font-size: 0.88rem; color: var(--muted); }
    .lvl-val  { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
    .empty-state { text-align: center; padding: 3rem; color: var(--muted); }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">⌨️ Typing <span>Master</span></div>
    <div class="nav-right">
      <a href="/typing" class="nav-btn">⌨️ Test</a>
      <a href="/profile" class="nav-btn">👤 Profile</a>
      <a href="/invite" class="nav-btn">🎁 Invite</a>
      <a href="/logout" class="nav-btn">Logout</a>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1>🏆 Leaderboard</h1>
      <p>Best WPM ke hisaab se Top Typers</p>
    </div>

    <div class="podium" id="podium"></div>

    <div class="board" id="board">
      <div class="empty-state">Loading…</div>
    </div>
  </main>

  <script>
    // User-supplied data (name) ko innerHTML mein daalne se pehle escape karo,
    // warna koi user apne naam mein script daal kar leaderboard dekhne walon
    // ke browser mein code chala sakta hai (stored XSS)
    function esc(str) {
      return String(str ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }

    async function load() {
      let lbRes, meRes;
      try {
        [lbRes, meRes] = await Promise.all([
          fetch('/api/leaderboard').then(r => r.json()),
          fetch('/api/me').then(r => r.json())
        ]);
        if (!lbRes.success) throw new Error(lbRes.message || 'Failed to load');
      } catch (err) {
        document.getElementById('board').innerHTML = '<div class="empty-state">⚠️ Leaderboard load nahi ho saka. Page refresh karo.</div>';
        return;
      }
      const board = lbRes.leaderboard;
      const myId  = meRes.success ? meRes.user.id : null;

      // Podium (top 3) - safely handle fewer than 3 users
      const podiumOrder = [board[1] || null, board[0] || null, board[2] || null]; // 2nd, 1st, 3rd
      const medalClass  = ['second', 'first', 'third'];
      const medals = ['🥈', '🥇', '🥉'];
      document.getElementById('podium').innerHTML = podiumOrder.map((u, i) => u ? `
        <div class="podium-card ${medalClass[i]}">
          <div class="podium-rank">${medals[i]}</div>
          <div class="podium-name">${esc(u.name)}</div>
          <div class="podium-wpm">${u.wpm} <span>wpm</span></div>
          <div class="podium-acc">${u.accuracy}% accuracy</div>
        </div>` : `
        <div class="podium-card ${medalClass[i]}" style="opacity:0.35">
          <div class="podium-rank">${medals[i]}</div>
          <div class="podium-name">—</div>
        </div>`).join('');

      // Agar koi result nahi hai to podium bilkul hide kar do (3 khaali cards na dikhein)
      if (!board.length) {
        document.getElementById('podium').innerHTML = '';
      }

      // Full board
      if (!board.length) {
        document.getElementById('board').innerHTML = '<div class="empty-state">Abhi koi results nahi hain. Pehle type karo! ⌨️</div>';
        return;
      }
      document.getElementById('board').innerHTML = `
        <div class="board-row header">
          <div>Rank</div><div>Naam</div><div>Best WPM</div><div>Accuracy</div><div>Level</div>
        </div>
        ${board.map(u => `
          <div class="board-row ${u.userId === myId ? 'me' : ''}">
            <div class="rank-num rank-${u.rank}">${u.rank <= 3 ? ['🥇','🥈','🥉'][u.rank-1] : '#'+u.rank}</div>
            <div class="user-name">${esc(u.name)}${u.userId === myId ? '<span class="you">Tum</span>' : ''}</div>
            <div class="wpm-val">${u.wpm} <span style="font-size:0.72rem;color:var(--muted)">wpm</span></div>
            <div class="acc-val">${u.accuracy}%</div>
            <div class="lvl-val" style="color:var(--muted)">L${u.level}</div>
          </div>`).join('')}`;
    }

    load();
  </script>
</body>
</html>
