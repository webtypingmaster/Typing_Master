<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typing Master — Set New Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161921; --border: #252a35;
      --accent: #7c6af7; --accent2: #4ecdc4;
      --text: #e8eaf0; --muted: #8892a4;
      --success: #4ecdc4; --error: #ff6b6b;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 2rem; overflow-y: auto;
    }
    body::before {
      content: ''; position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
      top: -200px; left: -100px; pointer-events: none;
    }
    body::after {
      content: ''; position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(78,205,196,0.08) 0%, transparent 70%);
      bottom: -100px; right: -100px; pointer-events: none;
    }
    .page {
      width: 100%; max-width: 480px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px; padding: 2.5rem 2rem;
      text-align: center;
    }
    .logo-row {
      display: flex; align-items: center;
      justify-content: center; gap: 10px;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .logo-text { font-size: 1.4rem; font-weight: 700; }
    .logo-text span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .key-icon {
      width: 72px; height: 72px;
      background: rgba(124,106,247,0.15);
      border-radius: 20px; margin: 0 auto 1.5rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
    }
    h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.5rem; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    .form-group { text-align: left; margin-bottom: 1.1rem; }
    label {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .input-wrap { position: relative; }
    input {
      width: 100%; padding: 0.8rem 1rem;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem; outline: none;
      transition: border-color 0.2s;
    }
    input.has-toggle { padding-right: 2.8rem; }
    input::placeholder { color: var(--muted); font-size: 0.85rem; }
    input:focus { border-color: var(--accent); }
    .toggle-eye {
      position: absolute; right: 0.9rem; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; font-size: 1.1rem;
      color: var(--muted); user-select: none;
      transition: color 0.2s;
    }
    .toggle-eye:hover { color: var(--accent); }
    .btn {
      width: 100%; padding: 0.9rem;
      background: linear-gradient(135deg, #4ecdc4, #3dbdb5);
      border: none; border-radius: 12px;
      color: #0d1a19; font-family: inherit;
      font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-top: 0.8rem;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .back-link {
      display: block; margin-top: 1.4rem;
      color: var(--accent2); font-size: 0.88rem;
      font-weight: 600; cursor: pointer;
      text-decoration: none; transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 0.7; }
    .message {
      margin-top: 1rem; padding: 0.75rem 1rem;
      border-radius: 10px; font-size: 0.88rem;
      text-align: center; display: none;
    }
    .message.error   { background: rgba(255,107,107,0.12); color: var(--error);   border: 1px solid rgba(255,107,107,0.25); }
    .message.success { background: rgba(78,205,196,0.12);  color: var(--success); border: 1px solid rgba(78,205,196,0.25); }

    /* Password strength bar */
    .strength-bar { height: 4px; border-radius: 4px; margin-top: 6px; background: var(--border); overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s; width: 0%; }
    .strength-text { font-size: 0.74rem; color: var(--muted); margin-top: 4px; text-align: right; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="logo-row">
        <div class="logo-icon">⌨️</div>
        <div class="logo-text">Typing <span>Master</span></div>
      </div>

      <div class="key-icon">🔑</div>
      <h2>Set New Password</h2>
      <p class="subtitle">Choose a new password for your account</p>

      <div class="form-group">
        <label>🔑 RESET TOKEN</label>
        <input type="text" id="reset-token" placeholder="6-digit token (email/admin se mila)" maxlength="6" />
      </div>

      <div class="form-group">
        <label>🔒 NEW PASSWORD</label>
        <div class="input-wrap">
          <input type="password" id="new-pass" class="has-toggle"
                 placeholder="Min 8 chars — Capital, small, number, !@#$%^&*"
                 oninput="checkStrength(this.value)" />
          <span class="toggle-eye" onclick="togglePw('new-pass', this)">👁️</span>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-text" id="strength-text"></div>
      </div>

      <div class="form-group">
        <label>🔒 CONFIRM PASSWORD</label>
        <div class="input-wrap">
          <input type="password" id="confirm-pass" class="has-toggle"
                 placeholder="Re-enter new password" />
          <span class="toggle-eye" onclick="togglePw('confirm-pass', this)">👁️</span>
        </div>
      </div>

      <button class="btn" onclick="resetPassword()">Update Password ✓</button>
      <div class="message" id="rp-msg"></div>
      <a class="back-link" href="/">← Back to Login</a>
    </div>
  </div>

  <script>
    // URL se sirf userId lo - token ab manually type hota hai (security fix:
    // token URL mein bheja hi nahi jata forgot-password page se)
    const params  = new URLSearchParams(window.location.search);
    const userId  = params.get('userId') || '';

    if (!userId) {
      document.querySelector('.card').innerHTML = `
        <div style="text-align:center;padding:2rem">
          <div style="font-size:2.5rem;margin-bottom:1rem">⚠️</div>
          <h2 style="color:#ff6b6b">Invalid Link</h2>
          <p style="color:var(--muted);margin-top:0.5rem">Yeh link invalid hai. Pehle forgot-password page se request karein.</p>
          <a href="/forgot-password" style="display:inline-block;margin-top:1.5rem;color:var(--accent2);font-weight:600">← Dobara try karein</a>
        </div>`;
    }

    function togglePw(id, icon) {
      const input = document.getElementById(id);
      if (input.type === 'password') { input.type = 'text'; icon.style.color = 'var(--accent)'; }
      else { input.type = 'password'; icon.style.color = 'var(--muted)'; }
    }

    function checkStrength(val) {
      const fill = document.getElementById('strength-fill');
      const text = document.getElementById('strength-text');
      let score = 0;
      if (val.length >= 8)              score++;
      if (/[A-Z]/.test(val))            score++;
      if (/[a-z]/.test(val))            score++;
      if (/\d/.test(val))               score++;
      // Backend (server.js) ke exact special-character set se match karta hua -
      // pehle yeh '?' allow karta tha jo backend reject karta hai, aur '#'/'^'
      // ignore karta tha jo backend allow karta hai
      if (/[!@#$%^&*]/.test(val))       score++;

      const colors = ['', '#ff6b6b', '#ffd166', '#ffd166', '#4ecdc4', '#4ecdc4'];
      const labels = ['', 'Bahut Kamzor', 'Kamzor', 'Theek', 'Mazboot', 'Bahut Mazboot'];
      fill.style.width     = (score * 20) + '%';
      fill.style.background = colors[score] || 'transparent';
      text.textContent     = val.length ? labels[score] : '';
      text.style.color     = colors[score] || 'var(--muted)';
    }

    function showMsg(text, type) {
      const el = document.getElementById('rp-msg');
      el.textContent = text; el.className = 'message ' + type;
      el.style.display = 'block';
    }

    async function resetPassword() {
      const token            = document.getElementById('reset-token').value.trim();
      const newPassword      = document.getElementById('new-pass').value;
      const confirmPassword  = document.getElementById('confirm-pass').value;

      if (!token) return showMsg('Reset token daalo.', 'error');
      if (!newPassword || !confirmPassword) return showMsg('Sab fields bharo.', 'error');
      if (newPassword !== confirmPassword)   return showMsg('Passwords match nahi karte.', 'error');

      try {
        const res  = await fetch('/api/reset-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, token, newPassword, confirmPassword })
        });
        const data = await res.json();

        if (data.success) {
          showMsg('✅ Password successfully update ho gaya!', 'success');
          setTimeout(() => window.location.href = '/', 1800);
        } else {
          showMsg(data.message || 'Error hua.', 'error');
        }
      } catch(e) {
        showMsg('Server se connect nahi ho saka.', 'error');
      }
    }

    document.addEventListener('keydown', e => {
      // Sirf form ke apne inputs (token/password) pe focus hote hue Enter se
      // submit karo - warna eye-toggle icon ya back-link pe Enter dabane se
      // bhi resetPassword() chal jata tha
      const formIds = ['reset-token', 'new-pass', 'confirm-pass'];
      if (e.key === 'Enter' && formIds.includes(document.activeElement.id)) {
        resetPassword();
      }
    });
  </script>
</body>
</html>
